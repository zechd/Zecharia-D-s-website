<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunrise Squad — Morning Routine</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="app">

    <header class="app-header">
      <div class="sun" aria-hidden="true">☀️</div>
      <h1>Sunrise Squad</h1>
      <p class="today" id="today-label"></p>
      <p class="kid-theme" id="kid-theme-label"></p>
    </header>

    <nav class="kid-picker" id="kid-picker">
      <button class="kid-btn" data-kid="yaer">
        <span class="kid-avatar photo-avatar">
          <img src="images/yaer.jpg" alt="Yaer" />
          <span class="avatar-badge">🥷</span>
        </span>
        <span class="kid-name">Yaer</span>
      </button>
      <button class="kid-btn" data-kid="tamar">
        <span class="kid-avatar photo-avatar">
          <img src="images/tamar.jpg" alt="Tamar" />
          <span class="avatar-badge">🐱</span>
        </span>
        <span class="kid-name">Tamar</span>
      </button>
    </nav>

    <section class="inspire-card" id="inspire-card">
      <div class="inspire-row">
        <span class="inspire-icon">🌟</span>
        <div class="inspire-text">
          <div class="inspire-label">Today's Words of Wisdom</div>
          <div class="inspire-quote" id="wisdom-quote"></div>
        </div>
      </div>
      <div class="inspire-row">
        <span class="inspire-icon" id="encouragement-icon">💪</span>
        <div class="inspire-text">
          <div class="inspire-label">Just For You</div>
          <div class="inspire-quote" id="encouragement-quote"></div>
        </div>
      </div>
    </section>

    <main class="board">
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 0 done</div>
      </div>

      <div class="streak" id="streak">
        <span class="streak-flame">🔥</span>
        <span id="streak-count">0</span>
        <span class="streak-label">day streak</span>
      </div>

      <ul class="task-list" id="task-list"></ul>
    </main>

    <footer class="app-footer">
      <button class="reset-btn" id="reset-btn" title="Reset today's checklist">↺ Start today over</button>
    </footer>
  </div>

  <div class="celebration" id="celebration">
    <div class="celebration-card">
      <div class="celebration-emoji">🌟</div>
      <div class="celebration-title" id="celebration-title">Great job!</div>
      <div class="celebration-sub">You finished your whole morning routine!</div>
      <button class="celebration-close" id="celebration-close">Yay!</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
